services:
  php-apache:
    build: ./apache
    container_name: lamp-php
    ports:
      - "80:80"
    volumes:
      - ./www:/var/www/html
    environment:
      - MYSQL_HOST=db
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: lamp-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: